services:
  db:
    image: postgres:16-alpine
    container_name: literary_life_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: literary_life
      POSTGRES_PASSWORD: literary_life_dev
      POSTGRES_DB: literary_life
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U literary_life"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./literary_life_backend
      dockerfile: Dockerfile
    container_name: literary_life_api
    restart: unless-stopped
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./literary_life_backend/.env
    volumes:
      - ./literary_life_backend/app:/app/app

volumes:
  postgres_data:
