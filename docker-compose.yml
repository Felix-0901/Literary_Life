services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: literary_life
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: literary_life
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U literary_life -d literary_life"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./literary_life_backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://literary_life:${POSTGRES_PASSWORD}@db:5432/literary_life
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      AI_API_URL: ${AI_API_URL}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL}
    ports:
      - "8000:8000"

volumes:
  postgres_data: