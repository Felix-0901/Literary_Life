name: CI

on:
  push:
  pull_request:

jobs:
  flutter:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: literary_life_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: literary_life
          POSTGRES_PASSWORD: literary_life
          POSTGRES_DB: literary_life
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U literary_life -d literary_life"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: literary_life_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m venv .venv
      - run: .venv/bin/pip install -r requirements-dev.txt
      - run: DATABASE_URL=postgresql+psycopg://literary_life:literary_life@localhost:5432/literary_life .venv/bin/alembic upgrade head
      - run: DATABASE_URL=postgresql+psycopg://literary_life:literary_life@localhost:5432/literary_life .venv/bin/pytest
