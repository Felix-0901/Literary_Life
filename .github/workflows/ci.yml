name: CI

on:
  push:
  pull_request:

jobs:
  flutter:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: literary_life_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: literary_life_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m venv .venv
      - run: .venv/bin/pip install -r requirements-dev.txt
      - run: DATABASE_URL=sqlite:///./ci.db .venv/bin/alembic upgrade head
      - run: .venv/bin/pytest
